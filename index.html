<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lacak Instan Kiriman POS</title>
  <link rel="icon" type="image/png" href="fav.png" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b1325 url('bg.png') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 400px;
    }

    h2 {
      margin-top: 0;
      text-align: center;
    }

    .input-wrapper {
      position: relative;
      width: 100%;
      margin-top: 10px;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px 40px 12px 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: #ff7a00;
      outline: none;
      box-shadow: 0 0 0 3px rgba(255, 122, 0, 0.15);
    }

    .clear-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      font-size: 18px;
      color: #999;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, background-color 0.2s, color 0.2s;
    }

    .clear-btn.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .clear-btn:hover {
      background-color: #f0f0f0;
      color: #333;
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #ff7a00;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #e56f00;
    }

    .url-preview {
      margin-top: 15px;
      font-size: 12px;
      word-break: break-all;
      color: #555;
      display: none;
    }

    footer {
      margin-top: 20px;
      font-size: 13px;
      color: #8892b0;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Lacak Instan Kiriman POS</h2>

    <div class="input-wrapper">
      <input
        type="text"
        id="resiInput"
        placeholder="Masukan nomor resi"
        autofocus
      />
      <button id="clearBtn" class="clear-btn" aria-label="Clear text">&times;</button>
    </div>

    <button onclick="openTracking()">
      Lacak
    </button>

    <div class="url-preview" id="preview"></div>
  </div>

  <footer>
    Vibe Coded by Adhitama
  </footer>

  <script>
    const baseUrl =
      "https://lacak-mitra.posindonesia.co.id/lacak_barcode.php?id=NOMORRESI&6f017f90-f299-11ec-988f-6f1763dc6f47xdsdkjshhsahsaks";

    const input = document.getElementById("resiInput");
    const preview = document.getElementById("preview");
    const clearBtn = document.getElementById("clearBtn");

    function getTrackingUrl() {
      const resi = input.value.trim();
      return baseUrl.replace("NOMORRESI", encodeURIComponent(resi));
    }

    function updatePreview() {
      // Auto uppercase
      input.value = input.value.toUpperCase();

      const resi = input.value.trim();

      // Show/hide clear button
      if (resi) {
        clearBtn.classList.add("visible");
      } else {
        clearBtn.classList.remove("visible");
      }

      // Hide preview if empty
      if (!resi) {
        preview.style.display = "none";
        preview.textContent = "";
        return;
      }

      preview.style.display = "block";
      preview.textContent = getTrackingUrl();
    }

    function openTracking() {
      const resi = input.value.trim();

      if (!resi) {
        alert("Please enter tracking number");
        return;
      }

      window.open(getTrackingUrl(), "_blank");
    }

    // Detect Enter key
    input.addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        openTracking();
      }
    });

    // Update preview on typing
    input.addEventListener("input", updatePreview);

    // Clear button functionality
    clearBtn.addEventListener("click", function() {
      input.value = "";
      updatePreview();
      input.focus();
    });

    updatePreview();
    input.focus();
  </script>

</body>
</html>
